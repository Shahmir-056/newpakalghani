<div class="splash-screen" [class.splash-screen--hiding]="hiding">

  <!-- Scan line sweep -->
  <div class="splash-scan"></div>

  <!-- Corner brackets -->
  <div class="splash-corner splash-corner--tl"></div>
  <div class="splash-corner splash-corner--tr"></div>
  <div class="splash-corner splash-corner--bl"></div>
  <div class="splash-corner splash-corner--br"></div>

  <!-- Main content -->
  <div class="splash-content">

    <!-- Logo with spinning rings -->
    <div class="splash-logo-wrap">
      <div class="splash-logo-ring-2"></div>
      <div class="splash-logo-ring"></div>
      <img src="logo.png" alt="New Pak  Al-Ghani" class="splash-logo" />
    </div>

    <!-- Brand name -->
    <div class="splash-brand">
      <span class="splash-name">New Pak Al-Ghani</span>
      <span class="splash-sub">Travel &amp; Tours JPS</span>
    </div>

    <!-- Tagline -->
    <p class="splash-tagline">Your trusted travel partner since 2005</p>

    <!-- Bouncing dots -->
    <div class="splash-dots">
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
    </div>

  </div>

  <!-- Loading bar at the very bottom -->
  <div class="splash-loader"></div>

</div>
